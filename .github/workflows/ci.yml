name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Reusable: release.yml calls this with `uses: ./.github/workflows/ci.yml`
  # so the release pipeline gates on the exact same test matrix without
  # copy-pasting it. Nightly depends on CI via workflow_run (decoupled).
  workflow_call: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Unit tests
        run: node --test

      - name: Bootstrap smoke-test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          .\Claude.bat --list-profiles || exit /b 1

      - name: Bootstrap smoke-test (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x claude.sh
          ./claude.sh --list-profiles
