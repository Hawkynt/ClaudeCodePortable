name: Nightly

# Runs after CI signals success on master/main. A red CI run will never
# produce a nightly, so the "latest" link always points at a tested build.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  nightly:
    # Gate on the upstream CI run (workflow_run path). A manual dispatch
    # (workflow_dispatch) has no workflow_run payload, so allow that too.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, check out the exact SHA the
          # CI run validated -- otherwise we'd grab whatever is at the tip
          # of the branch right now, which may have moved.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0                              # version.pl needs full history

      - name: Compute date + version
        id: meta
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VERSION=$(perl scripts/version.pl)
          TAG="nightly-$DATE"
          echo "date=$DATE"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "Resolved: $TAG ($VERSION)"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update CHANGELOG
        run: node scripts/update-changelog.mjs --nightly --version "${{ steps.meta.outputs.version }}"

      - name: Build release zip
        run: |
          D="${{ steps.meta.outputs.date }}"
          STAGE="ClaudeCodePortable-nightly-${D}"
          rm -rf "$STAGE" dist
          mkdir -p dist "$STAGE"
          cp -r launcher scripts Claude.bat claude.sh README.md LICENSE CHANGELOG.md .gitignore VERSION "$STAGE/"
          [ -d assets ] && cp -r assets "$STAGE/" || true
          chmod +x "$STAGE/claude.sh"
          (cd . && zip -r "dist/${STAGE}.zip" "$STAGE")
          ls -la dist

      - name: Delete same-date nightly if it exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release delete "${{ steps.meta.outputs.tag }}" --cleanup-tag --yes
          fi

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
              --title "Nightly ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.version }})" \
              --prerelease \
              --notes "Automated build of commit \`${{ github.event.workflow_run.head_sha || github.sha }}\`.

          Version: \`${{ steps.meta.outputs.version }}\`

          Unpack and run \`Claude.bat\` (Windows) or \`./claude.sh\` (Linux/macOS)." \
              dist/*.zip

      - name: GFS prune of old nightlies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/prune-nightlies.mjs
