name: Release

# Tag pushes don't trigger CI (CI is branch-scoped), so the release
# pipeline gates itself: the `build` job only runs if the `test` job
# passes, and `publish` only runs if `build` produced an artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual release trigger'
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Re-runs the full CI matrix (ubuntu / windows / macOS, Node 22, unit
  # tests + bootstrap smoke test). Tag pushes don't trigger ci.yml on
  # their own -- calling it here keeps release gated on the same signal
  # without duplicating the steps.
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                          # version.pl needs full history

      - name: Compute version
        id: version
        run: |
          V=$(perl scripts/version.pl)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update CHANGELOG
        run: node scripts/update-changelog.mjs --release "${GITHUB_REF_NAME}"

      - name: Build release zip
        run: |
          V="${{ steps.version.outputs.version }}"
          STAGE="ClaudeCodePortable-${V}"
          rm -rf "$STAGE" dist
          mkdir -p dist "$STAGE"
          cp -r launcher scripts Claude.bat claude.sh README.md LICENSE CHANGELOG.md .gitignore VERSION "$STAGE/"
          [ -d assets ] && cp -r assets "$STAGE/" || true
          chmod +x "$STAGE/claude.sh"
          (cd "$(dirname "$STAGE")" && zip -r "dist/${STAGE}.zip" "$STAGE")
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: ClaudeCodePortable
          path: dist/*.zip

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ClaudeCodePortable
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
