name: Screenshots

on:
  push:
    branches: [master, main]
    paths:
      - 'launcher/**'
      - 'scripts/capture-screenshots.mjs'
      - 'scripts/screenshot-fixtures/**'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: screenshots
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install freeze
        run: |
          # Resolve the latest charmbracelet/freeze release tag dynamically
          # so the workflow doesn't rot when upstream ships a new version.
          TAG=$(curl -fsSL -H 'Accept: application/vnd.github+json' \
                https://api.github.com/repos/charmbracelet/freeze/releases/latest \
                | grep -oE '"tag_name"\s*:\s*"[^"]+"' | head -n1 | cut -d'"' -f4)
          VER="${TAG#v}"
          echo "installing freeze ${TAG}"
          curl -fsSL -o freeze.tar.gz \
               "https://github.com/charmbracelet/freeze/releases/download/${TAG}/freeze_${VER}_Linux_x86_64.tar.gz"
          tar -xzf freeze.tar.gz
          sudo install -m 0755 "freeze_${VER}_Linux_x86_64/freeze" /usr/local/bin/freeze
          freeze --help >/dev/null 2>&1 || freeze -h >/dev/null 2>&1 || true

      - name: Capture ANSI frames
        run: node scripts/capture-screenshots.mjs

      - name: Render PNGs
        run: |
          mkdir -p assets/screenshots
          for name in session profile doctor; do
              freeze \
                  --language ansi \
                  --theme dracula \
                  --window \
                  --padding 24 \
                  --font.size 14 \
                  "build/${name}.ansi" \
                  --output "assets/screenshots/${name}.png"
          done
          ls -la assets/screenshots

      - name: Commit updated screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh screenshots'
          file_pattern: 'assets/screenshots/*.png'
